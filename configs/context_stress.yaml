# =============================================================================
# Context Stress Benchmark
# =============================================================================
# Profile how P95 TTFT and ITL degrade as prompt length grows toward each
# model's max_model_len.  This is a fitness check, not a ranking benchmark.
#
# Run BEFORE Goal 1 to flag context-sensitive models.
# See PRD §4.3 for design rationale.
# =============================================================================

benchmark:
  name: "Context Stress"
  description: "Profile TTFT/ITL degradation across growing prompt lengths at fixed concurrency"
  output_prefix: "context_stress"

model:
  name: "auto"  # Auto-detected from the running vLLM server

# Prompt tiers to profile — values exceeding model.max_model_len are skipped
prompt_token_lengths: [512, 2048, 8192, 32768, 65536]

requests:
  num_requests: 100        # Fewer than Goal 1; this is a profile, not a ranking
  concurrency: 10          # Same as Goal 1 for apples-to-apples degradation curve
  output_tokens: 256       # Fixed — isolates prefill pressure
  system_prompt: |
    You are a helpful AI assistant.

telemetry:
  sample_interval_sec: 2.0
  collect_gpu_stats: true
  collect_power_draw: false
  collect_temperature: false
  collect_memory_clock: false
