# =============================================================================
# docker-compose.yml — Blackwell Inference Testbench
# =============================================================================
# Services:
#   vllm-8000    Inference server on port 8000 — always used
#   vllm-8001    Inference server on port 8001 — co-deploy / co-serve only
#   bench-runner  Benchmark runner for single-model benchmarks
#   co-runner     Benchmark runner for co-deploy (Goal 2)
#   nvitop        One-shot GPU snapshot (monitoring profile)
# =============================================================================

services:
  # ── vLLM server on port 8000 (primary / single model) ─────────────────────
  vllm-8000:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:cu130-nightly}
    container_name: vllm-8000
    runtime: nvidia
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN:-}
      - VLLM_DISABLE_COMPILE_CACHE=1
      - SKIP_ENTRYPOINT_PIP=${SKIP_ENTRYPOINT_PIP:-0}
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./results:/results
      - ./scripts/vllm-entrypoint.sh:/usr/local/bin/vllm-entrypoint.sh:ro
      - ./tool_chat_template_gemma4.jinja:/app/template.jinja:ro
    entrypoint: ["/usr/local/bin/vllm-entrypoint.sh"]
    command: >
      --host 0.0.0.0
      --port 8000
      --model ${MODEL_NAME:-mistralai/Mistral-7B-Instruct-v0.3}
      --tensor-parallel-size ${TENSOR_PARALLEL:-1}
      --gpu-memory-utilization ${GPU_MEMORY_UTIL:-0.92}
      ${MAX_MODEL_LEN_FLAG:-}
      ${QUANTIZATION_FLAG:-}
      ${ENABLE_PREFIX_CACHING_FLAG---enable-prefix-caching}
      --trust-remote-code
      ${EXTRA_VLLM_FLAGS:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - inference-net

  # ── vLLM server on port 8001 (co-deploy / co-serve only) ──────────────────
  vllm-8001:
    image: ${SMALL_VLLM_IMAGE:-vllm/vllm-openai:cu130-nightly}
    container_name: vllm-8001
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN:-}
      - VLLM_DISABLE_COMPILE_CACHE=1
      - SKIP_ENTRYPOINT_PIP=${SMALL_SKIP_ENTRYPOINT_PIP:-0}
    ports:
      - "8001:8001"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./results:/results
      - ./scripts/vllm-entrypoint.sh:/usr/local/bin/vllm-entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/vllm-entrypoint.sh"]
    command: >
      --host 0.0.0.0
      --port 8001
      --model ${SMALL_MODEL_NAME}
      --tensor-parallel-size ${SMALL_TENSOR_PARALLEL:-1}
      --gpu-memory-utilization ${SMALL_GPU_MEMORY_UTIL:-0.25}
      ${SMALL_MAX_MODEL_LEN_FLAG:-}
      ${SMALL_QUANTIZATION_FLAG:-}
      --trust-remote-code
      ${SMALL_EXTRA_VLLM_FLAGS:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    profiles:
      - co-deploy
    networks:
      - inference-net

  # ── Benchmark runner (single-model: sanity, concurrency-bench)
  bench-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bench-runner
    depends_on:
      vllm-8000:
        condition: service_healthy
    environment:
      - VLLM_ENDPOINT=http://vllm-8000:8000/v1
      - CONFIG_PATH=${CONFIG_PATH:-/configs/sanity_check.yaml}
    volumes:
      - ./configs:/configs:ro
      - ./core:/app/core:ro
      - ./results:/results
    command: python /app/core/bench_runner.py --config ${CONFIG_PATH:-/configs/sanity_check.yaml}
    networks:
      - inference-net
    profiles:
      - benchmark

  # ── Co-deploy runner (Goal 2: split-load against two endpoints) ────────────
  co-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: co-runner
    environment:
      - VLLM_ENDPOINT_LARGE=http://vllm-8000:8000/v1
      - VLLM_ENDPOINT_SMALL=http://vllm-8001:8001/v1
      - LARGE_MODEL_NAME=${MODEL_NAME:-}
      - SMALL_MODEL_NAME=${SMALL_MODEL_NAME:-}
    volumes:
      - ./configs:/configs:ro
      - ./core:/app/core:ro
      - ./results:/results
    depends_on:
      vllm-8000:
        condition: service_healthy
      vllm-8001:
        condition: service_healthy
    profiles:
      - co-deploy
    networks:
      - inference-net

  # ── STT benchmark runner (single-model STT: stt-sanity, stt-concurrency-bench)
  stt-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stt-runner
    depends_on:
      vllm-8000:
        condition: service_healthy
    environment:
      - VLLM_ENDPOINT=http://vllm-8000:8000/v1
      - CONFIG_PATH=${CONFIG_PATH:-/configs/stt_sanity.yaml}
    volumes:
      - ./configs:/configs:ro
      - ./core:/app/core:ro
      - ./assets:/assets:ro
      - ./results:/results
    command: python /app/core/stt_runner.py --config ${CONFIG_PATH:-/configs/stt_sanity.yaml}
    networks:
      - inference-net
    profiles:
      - stt-benchmark

  # ── Streaming STT benchmark runner (WebSocket /v1/realtime) ─────────────────
  stt-streaming-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stt-streaming-runner
    depends_on:
      vllm-8000:
        condition: service_healthy
    environment:
      - VLLM_ENDPOINT=http://vllm-8000:8000/v1
      - CONFIG_PATH=${CONFIG_PATH:-/configs/stt_streaming_sanity.yaml}
    volumes:
      - ./configs:/configs:ro
      - ./core:/app/core:ro
      - ./assets:/assets:ro
      - ./results:/results
    command: python /app/core/stt_streaming_runner.py --config ${CONFIG_PATH:-/configs/stt_streaming_sanity.yaml}
    networks:
      - inference-net
    profiles:
      - stt-benchmark

  # ── Mixed co-deploy runner (Text + STT simultaneous benchmark) ─────────────
  mixed-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mixed-runner
    environment:
      - VLLM_ENDPOINT_LARGE=http://vllm-8000:8000/v1
      - VLLM_ENDPOINT_SMALL=http://vllm-8001:8001/v1
      - LARGE_MODEL_NAME=${MODEL_NAME:-}
      - SMALL_MODEL_NAME=${SMALL_MODEL_NAME:-}
    volumes:
      - ./configs:/configs:ro
      - ./core:/app/core:ro
      - ./assets:/assets:ro
      - ./results:/results
    depends_on:
      vllm-8000:
        condition: service_healthy
      vllm-8001:
        condition: service_healthy
    profiles:
      - co-deploy
    networks:
      - inference-net

  # ── GPU telemetry (optional) ───────────────────────────────────────────────
  nvitop:
    image: nvidia/cuda:12.3.0-base-ubuntu22.04
    container_name: gpu-monitor
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./results:/results
    command: >
      bash -c "
      apt-get update && apt-get install -y python3 python3-pip &&
      pip3 install nvitop &&
      nvitop --once > /results/gpu_snapshot_$(date +%Y%m%d_%H%M%S).txt
      "
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - inference-net
    profiles:
      - monitoring

networks:
  inference-net:
    driver: bridge

volumes:
  huggingface-cache:
