# =============================================================================
# models.yaml  —  THE ONLY FILE YOU NEED TO EDIT
# =============================================================================
# List every model you want to benchmark. `make concurrency-bench`,
# and `make co-deploy` iterate over this list.
#
# Fields per model:
#   name            HuggingFace model ID
#   label           Short slug used in output filenames (no spaces)
#   role            large | small — determines endpoint in co-deploy (§6.1)
#   quantization    none | fp8 | awq | gptq
#   gpu_memory_util Fraction of GPU VRAM to allocate (0.0 – 1.0)
#   tensor_parallel Number of GPUs to shard across (1 for single-GPU)
#   topology        dense | sparse_moe
#                   dense:      all parameters are active on every forward pass.
#                   sparse_moe: Mixture-of-Experts — only a small subset of
#                               parameters (the "active" params) are used per
#                               token, but ALL expert weights still load into
#                               VRAM. VRAM requirement is set by total param
#                               count, not active param count.
#   loaded_gb       Approximate VRAM when loaded (weights + overhead).
#                   Used by sweep.py to auto-compute proportional
#                   gpu_memory_util splits for co-deploy pairs.
#   modality        text | stt | vlm
#                   text:  Standard chat/completion model (default).
#                   stt:   Speech-to-text model (e.g., Voxtral, Whisper).
#                          Benchmarked with audio files, scored by WER.
#                   vlm:   Vision-language model — accepts image+text input.
#                          Benchmarked with image+text prompts (future).
#                          Same HF model may appear twice: once as text
#                          (with --language-model-only) and once as vlm.
#   vllm_extra_flags  (optional) Additional vLLM CLI flags passed verbatim.
#                   Example: "--language-model-only" to skip vision encoders
#                   on multimodal models for text-only benchmarks.
#   vllm_image        (optional) Docker image for this model's vLLM server.
#                   Default: vllm/vllm-openai:cu130-nightly (stock nightly).
#                   Models requiring custom wheels (e.g. gpt-oss MXFP4)
#                   should point to a purpose-built image.
#
# Co-deploy pairs: sweep.py auto-computes memory splits proportional to
#   loaded_gb, within a total budget of 0.92.  Pairs that cannot fit are
#   skipped automatically.
#
# Mixed co-deploy: A text model (role=large) + an STT model (role=small)
#   can be co-deployed and benchmarked simultaneously to simulate real-world
#   usage (e.g., meeting transcription + LLM queries at the same time).
#
# All models below are publicly available without gated access.
# =============================================================================

models:

  # ── Large (80B–125B) ─────────────────────────────────────────────────────────
  # Dense: all weights active. Sparse MoE: all weights load into VRAM regardless
  # of active-param count — VRAM requirement is determined by total param count.

  - name: Sehyo/Qwen3.5-122B-A10B-NVFP4
    label: qwen35-122b-a10b-nvfp4-text
    role: large
    modality: text
    quantization: none          # NVFP4 via compressed-tensors — vLLM auto-detects from checkpoint config; do NOT pass --quantization
    gpu_memory_util: 0.80
    tensor_parallel: 1          # ~65 GB NVFP4 (W4A4) — fits single 96 GB GPU; 0.80 leaves ~19 GB for Triton autotuner scratch on DeltaNet FLA kernels
    topology: sparse_moe        # 122B total (qwen3_5_moe), 10B active per token
    loaded_gb: 65
    vllm_extra_flags: "--language-model-only --enforce-eager --reasoning-parser qwen3"   # enforce-eager: CUDA graphs crash on hybrid DeltaNet+MoE; no --tokenizer needed (native safetensors)

  - name: Sehyo/Qwen3.5-122B-A10B-NVFP4
    label: qwen35-122b-a10b-nvfp4-vlm
    role: large
    modality: vlm
    quantization: none
    gpu_memory_util: 0.85
    tensor_parallel: 1
    topology: sparse_moe
    loaded_gb: 70               # ~5 GB more with vision encoder loaded
    vllm_extra_flags: "--enforce-eager --reasoning-parser qwen3"

  - name: Qwen/Qwen3.5-122B-A10B-GPTQ-Int4
    label: qwen35-122b-a10b-gptq-int4-text
    role: large
    modality: text
    quantization: moe_wna16     # GPTQ-Int4 MoE — vLLM requires --quantization moe_wna16 (not gptq) for MoE WNA16 kernels
    gpu_memory_util: 0.80
    tensor_parallel: 1          # ~65 GB GPTQ-Int4 — fits single 96 GB GPU; 0.80 leaves ~19 GB for Triton autotuner scratch on DeltaNet FLA kernels
    topology: sparse_moe        # 122B total (qwen3_5_moe), 10B active per token
    loaded_gb: 65
    vllm_extra_flags: "--language-model-only --enforce-eager --reasoning-parser qwen3"   # enforce-eager: CUDA graphs crash on hybrid DeltaNet+MoE

  - name: Qwen/Qwen3.5-122B-A10B-GPTQ-Int4
    label: qwen35-122b-a10b-gptq-int4-vlm
    role: large
    modality: vlm
    quantization: moe_wna16
    gpu_memory_util: 0.85
    tensor_parallel: 1
    topology: sparse_moe
    loaded_gb: 70               # ~5 GB more with vision encoder loaded
    vllm_extra_flags: "--enforce-eager --reasoning-parser qwen3"

  - name: openai/gpt-oss-120b
    label: gpt-oss-120b
    role: large
    modality: text
    quantization: none          # Pre-quantized MXFP4 — vLLM auto-detects from checkpoint; do NOT pass --quantization
    gpu_memory_util: 0.95
    tensor_parallel: 1
    topology: sparse_moe        # 117B total, 5.1B active per token (MoE, not dense)
    loaded_gb: 60               # ~60 GB with native MXFP4 (was 66 GB under Marlin FP4→FP16 fallback)
    vllm_image: vllm/vllm-openai:gptoss   # Official image with native MXFP4 kernels (verified working on Blackwell + driver 595)
    # GPT-OSS uses attention sinks. FA2 lacks sinks support; FA3 unavailable on SM120 Blackwell;
    # FlashInfer in this image has a sinks dtype bug (expects fp32, gets bf16). TRITON works.
    attention_backend: TRITON_ATTN_VLLM_V1

  - name: Qwen/Qwen3-Coder-Next-FP8
    label: qwen3-coder-next-fp8
    role: large
    modality: text
    quantization: none          # Pre-quantized FP8 by Qwen — vLLM auto-detects; do NOT pass --quantization
    gpu_memory_util: 0.90
    tensor_parallel: 1
    topology: sparse_moe        # 80B total (qwen3_next hybrid DeltaNet+Attn+MoE), 3B active; 512 experts, 10 active + 1 shared
    loaded_gb: 80
    vllm_extra_flags: "--enforce-eager --max-model-len 32768"   # enforce-eager: CUDA graphs crash on hybrid DeltaNet+MoE; max-model-len: 256K default OOMs on single GPU

  # ── Medium (27B–36B) ─────────────────────────────────────────────────────────

  - name: google/gemma-4-26B-A4B-it
    label: gemma4-26b-a4b-text
    role: large
    modality: text
    quantization: none          # BF16; no pre-quantized FP8 variant available yet
    gpu_memory_util: 0.90
    tensor_parallel: 1
    topology: sparse_moe        # 26B total, 4B active per token; 128 fine-grained experts, top-8 routing
    loaded_gb: 52               # ~26B × 2 bytes BF16; calibrate after solo load with nvidia-smi
    vllm_image: vllm/vllm-openai:gemma4-cu130
    vllm_extra_flags: "--limit-mm-per-prompt '{\"image\": 0, \"audio\": 0}' --max-model-len 131072 --enable-auto-tool-choice --tool-call-parser gemma4 --reasoning-parser gemma4 --chat-template /app/template.jinja"

  - name: google/gemma-4-26B-A4B-it
    label: gemma4-26b-a4b-vlm
    role: large
    modality: vlm
    quantization: none          # BF16; no pre-quantized FP8 variant available yet
    gpu_memory_util: 0.90
    tensor_parallel: 1
    topology: sparse_moe        # 26B total, 4B active per token; 128 fine-grained experts, top-8 routing
    loaded_gb: 57               # ~52 GB weights + ~5 GB for ~550M vision encoder
    vllm_image: vllm/vllm-openai:gemma4-cu130
    vllm_extra_flags: "--max-model-len 131072 --enable-auto-tool-choice --tool-call-parser gemma4 --reasoning-parser gemma4 --chat-template /app/template.jinja"

  - name: Qwen/Qwen3.5-27B-FP8
    label: qwen35-27b-fp8-text
    role: large
    modality: text
    quantization: none          # Pre-quantized FP8 (block-128) by Qwen — vLLM auto-detects; do NOT pass --quantization
    gpu_memory_util: 0.90
    tensor_parallel: 1
    topology: dense             # 28B dense (qwen3_5), Gated DeltaNet + Gated Attention hybrid
    loaded_gb: 28
    vllm_extra_flags: "--language-model-only --reasoning-parser qwen3 --enable-auto-tool-choice --tool-call-parser qwen3_coder"

  - name: Qwen/Qwen3.5-27B
    label: qwen35-27b-text
    role: large
    modality: text
    quantization: fp8           # BF16 ~56 GB; FP8 brings it to ~28 GB
    gpu_memory_util: 0.90
    tensor_parallel: 1
    topology: dense             # 28B dense (qwen3_5), multimodal image-text-to-text
    loaded_gb: 28
    vllm_extra_flags: "--language-model-only --reasoning-parser qwen3"   # Qwen3.5: skip vision encoder; reasoning-parser required for think-block parsing

  - name: Qwen/Qwen3.5-27B
    label: qwen35-27b-vlm
    role: large
    modality: vlm
    quantization: fp8
    gpu_memory_util: 0.90
    tensor_parallel: 1
    topology: dense
    loaded_gb: 32               # ~4 GB more with vision encoder loaded
    vllm_extra_flags: "--reasoning-parser qwen3"

  - name: Qwen/Qwen3.5-35B-A3B
    label: qwen35-35b-a3b-text
    role: large
    modality: text
    quantization: fp8           # BF16 ~72 GB; FP8 brings it to ~36 GB
    gpu_memory_util: 0.90
    tensor_parallel: 1
    topology: sparse_moe        # 36B total (qwen3_5_moe), 3B active per token
    loaded_gb: 36
    vllm_extra_flags: "--language-model-only --reasoning-parser qwen3"   # Qwen3.5: skip vision encoder; reasoning-parser required for think-block parsing

  - name: Qwen/Qwen3.5-35B-A3B
    label: qwen35-35b-a3b-vlm
    role: large
    modality: vlm
    quantization: fp8
    gpu_memory_util: 0.90
    tensor_parallel: 1
    topology: sparse_moe
    loaded_gb: 40               # ~4 GB more with vision encoder loaded
    vllm_extra_flags: "--reasoning-parser qwen3"

  - name: zai-org/GLM-4.7-Flash
    label: glm-47-flash
    role: large
    modality: text
    quantization: none          # BF16; MoE: small active KV footprint
    gpu_memory_util: 0.92
    tensor_parallel: 1
    topology: sparse_moe        # 30B total (glm4_moe_lite), 3B active per token
    loaded_gb: 60

  # ── Small (8B–14B) ───────────────────────────────────────────────────────────

  - name: nvidia/NVIDIA-Nemotron-Nano-9B-v2
    label: nemotron-nano-9b-v2
    role: small
    modality: text
    quantization: none          # BF16; hybrid Mamba2-Transformer (nemotron_h)
    gpu_memory_util: 0.85
    tensor_parallel: 1
    topology: dense             # All params active (Mamba2 + 4 Attention layers)
    loaded_gb: 18

  - name: mistralai/Ministral-3-14B-Instruct-2512
    label: ministral3-14b-text
    role: small
    modality: text
    quantization: none          # Pre-quantized FP8; 13.5B LM + 0.4B vision encoder
    gpu_memory_util: 0.85
    tensor_parallel: 1
    topology: dense
    loaded_gb: 14

  - name: mistralai/Ministral-3-14B-Instruct-2512
    label: ministral3-14b-vlm
    role: small
    modality: vlm
    quantization: none
    gpu_memory_util: 0.85
    tensor_parallel: 1
    topology: dense
    loaded_gb: 15               # ~1 GB more with vision encoder active

  - name: mistralai/Ministral-3-8B-Instruct-2512
    label: ministral3-8b
    role: small
    modality: text
    quantization: none          # Pre-quantized FP8; ~8.9B params (mistral3)
    gpu_memory_util: 0.85
    tensor_parallel: 1
    topology: dense
    loaded_gb: 9

  # ── STT (Speech-to-Text) ─────────────────────────────────────────────────

  - name: mistralai/Voxtral-Mini-4B-Realtime-2602
    label: voxtral-mini-4b
    role: small
    modality: stt               # Speech-to-text — benchmarked with WER on audio datasets
    quantization: none          # BF16; 3.4B LLM + 970M Audio Encoder = 4.4B total
    gpu_memory_util: 0.95
    tensor_parallel: 1
    topology: dense
    loaded_gb: 9
    vllm_extra_flags: "--max-model-len 2048 --compilation_config '{\"cudagraph_mode\": \"PIECEWISE\"}'"

  - name: mistralai/Voxtral-Mini-3B-2507
    label: voxtral-mini-3b
    role: small
    modality: stt               # Speech-to-text — benchmarked with WER on audio datasets
    quantization: none          # ~3B params
    gpu_memory_util: 0.95
    tensor_parallel: 1
    topology: dense
    loaded_gb: 6
    vllm_extra_flags: "--tokenizer_mode mistral --config_format mistral --load_format mistral"

  - name: CohereLabs/cohere-transcribe-03-2026
    label: cohere-transcribe-2b
    role: small
    modality: stt               # Speech-to-text — 2B conformer encoder-decoder ASR, 14 languages
    quantization: none          # BF16; 2B params (cohere_asr)
    gpu_memory_util: 0.85
    tensor_parallel: 1
    topology: dense
    loaded_gb: 5
    vllm_extra_flags: "--trust-remote-code"
